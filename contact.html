<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - MainCrafts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Get in Touch</h2>
    <form id="contactForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe">
        <div class="error-msg" id="nameError">Name is required.</div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com">
        <div class="error-msg" id="emailError">Please enter a valid email.</div>
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" rows="4" placeholder="How can we help you?"></textarea>
        <div class="error-msg" id="messageError">Message cannot be empty.</div>
      </div>

      <button type="submit">Send Message</button>
    </form>
    <a href="submissions.html" class="nav-link">View All Submissions →</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
